name: Test Run

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Python installieren
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Pakete installieren
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Script starten
        run: python main.py
