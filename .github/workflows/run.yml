name: Night Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Run script
        run: python main.py

      - name: Upload screenshot & HTML
        uses: actions/upload-artifact@v4
        with:
          name: page-artifacts
          path: |
            screenshot.png
            page.html
